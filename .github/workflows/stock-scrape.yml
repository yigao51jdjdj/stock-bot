name: Stock Data Scraper

on:
  # 瀹氭椂杩愯 - 姣忔棩涓夋
  schedule:
    # 鏃╀笂 9:00 (鍖椾含鏃堕棿)
    - cron: '0 1 * * 1-5'
    # 涓崍 13:00 (鍖椾含鏃堕棿)
    - cron: '0 5 * * 1-5'
    # 鏅氫笂 22:00 (鍖椾含鏃堕棿)
    - cron: '0 14 * * 1-5'

  # 鎵嬪姩瑙﹀彂
  workflow_dispatch:
    inputs:
      symbols:
        description: '鑲＄エ浠ｇ爜 (閫楀彿鍒嗛殧)'
        required: false
        default: ''
      output_format:
        description: '杈撳嚭鏍煎紡 (json/csv)'
        required: false
        default: 'json'
      notify_type:
        description: '閫氱煡绫诲瀷 (price/summary)'
        required: false
        default: 'summary'

env:
  PYTHON_VERSION: '3.10'

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create config file
        run: |
          cat > config_actions.json << EOF
          {
            "global_symbols": ["MSTR", "CRCL", "AXTI", "TSM", "NBIS", "PLTR", "RKLB", "SNDK", "HOOD", "COIN", "ASTS", "MU"],
            "a_share_symbols": [],
            "data_dir": "data",
            "output_format": "json",
            "notifications": {
              "email": {
                "enabled": true,
                "smtp_host": "smtp.mail.me.com",
                "smtp_port": 465,
                "use_ssl": true,
                "sender": "$EMAIL_SENDER",
                "password": "$EMAIL_PASSWORD",
                "receiver": "$EMAIL_RECEIVER"
              }
            }
          }
          EOF
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}

      - name: Run stock data scraper
        env:
          STOCK_SYMBOLS: ${{ github.event.inputs.symbols }}
          OUTPUT_FORMAT: ${{ github.event.inputs.output_format }}
          NOTIFY_TYPE: ${{ github.event.inputs.notify_type }}
        run: |
          python src/main.py --config config_actions.json --output ${OUTPUT_FORMAT:-json} --notify-type ${NOTIFY_TYPE:-summary}

      - name: Upload data artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stock-data-${{ github.run_id }}
          path: data/
          retention-days: 30

      - name: Commit and push data (optional)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/
          git diff --staged --quiet || git commit -m "Update stock data: $(date +'%Y-%m-%d %H:%M')"
          git push || echo "No changes to push"
